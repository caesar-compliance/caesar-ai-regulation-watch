# Pilot official source — European Data Protection Supervisor
# Last curated: 19 May 2026

source_id: edps
title: European Data Protection Supervisor (EDPS)
jurisdiction_id: eu
source_type: regulator
credibility_level: official_primary
official_url: https://www.edps.europa.eu/
monitoring_scope: >
  EDPS opinions, guidance, investigations summaries, and policy documents on AI,
