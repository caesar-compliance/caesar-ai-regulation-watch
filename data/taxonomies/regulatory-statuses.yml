# Operational regulatory status labels — v0.3.1
# Not legal determinations. Verify on official sources.
# Last updated: 19 May 2026

taxonomy_id: regulatory-statuses
title: Regulatory statuses
version: "0.3.1"
last_updated: "2026-05-19"
description: >
  Tracked operational labels for laws and guidance records. Not a substitute
  for legal status analysis.

values:
  - value_id: proposed
    label: Proposed
    description: Tracked as under legislative or rulemaking process.

  - value_id: adopted
    label: Adopted
    description: Tracked as adopted text available on an official source.

  - value_id: in_force
    label: In force
    description: Tracked as effective per official source (subject to phased application).

  - value_id: guidance
    label: Guidance
    description: Official guidance, FAQ, or interpretive material (not necessarily binding law).

  - value_id: implementation_update
    label: Implementation update
    description: Tracked implementation or transposition update (e.g. EEA/national).

  - value_id: voluntary
    label: Voluntary
    description: Voluntary framework, code of practice, or non-binding instrument.

  - value_id: withdrawn
    label: Withdrawn
    description: Tracked as repealed, withdrawn, or superseded on official sources.

  - value_id: monitoring
    label: Monitoring
    description: Jurisdiction or topic under watch with limited instrument detail.

  - value_id: unknown
    label: Unknown
    description: Status not yet verified on official source; requires review.
