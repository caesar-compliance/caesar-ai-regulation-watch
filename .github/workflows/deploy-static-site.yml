# Manual GitHub Pages deploy — custom domain (v0.9.0+)
# Does NOT run on push. Does NOT use secrets.
# Requires: Repository Settings → Pages → custom domain regulation-watch.caesar.no
#           Build and deployment → GitHub Actions.

name: Deploy static site

on:
  workflow_dispatch:
    inputs:
      confirm_disclaimers:
        description: "Type DEPLOY to confirm pilot disclaimers and review gates were read"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: inputs.confirm_disclaimers == 'DEPLOY'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate evidence export candidates
        run: npm run generate:evidence-candidates

      - name: Validate data
        run: npm run validate:data

      - name: Generate static exports
        run: npm run generate:exports
        env:
          ASTRO_SITE: https://regulation-watch.caesar.no

      - name: Build site for custom domain
        env:
          ASTRO_SITE: https://regulation-watch.caesar.no
        run: npm run build:custom-domain

      - name: Verify dist output
        run: npm run verify:dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  gate-failed:
    if: inputs.confirm_disclaimers != 'DEPLOY'
    runs-on: ubuntu-latest
    steps:
      - name: Abort — confirmation required
        run: |
          echo "Deploy aborted. Re-run workflow and set confirm_disclaimers to exactly: DEPLOY"
          echo "See docs/PUBLIC_RELEASE_CHECKLIST.md and docs/STATIC_DEPLOYMENT_ARCHITECTURE.md"
          exit 1
