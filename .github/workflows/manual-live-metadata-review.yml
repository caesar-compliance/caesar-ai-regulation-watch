# Manual-gated live metadata review (v0.9.8)
# workflow_dispatch only — no schedule, push, PR, deploy, auto-commit, or secrets.
name: Manual live metadata review

on:
  workflow_dispatch:
    inputs:
      confirm_live_metadata:
        description: "Type RUN to confirm cautious live metadata pilot (5 sources, metadata only)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: manual-live-metadata-review-${{ github.repository }}
  cancel-in-progress: true

jobs:
  live-metadata-review:
    if: inputs.confirm_live_metadata == 'RUN'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate data baseline
        run: npm run validate:data

      - name: Build live metadata review artifact pack
        run: |
          export LIVE_METADATA_RUN_DATE="$(date -u +%Y-%m-%d)"
          export LIVE_METADATA_SUFFIX="ci-${{ github.run_id }}"
          export LIVE_METADATA_ARTIFACT_DIR="tmp/live-metadata-review-pack"
          npm run monitoring:live-artifact

      - name: Monitoring policy check
        run: npm run monitoring:policy-check

      - name: Upload review artifact pack
        uses: actions/upload-artifact@v4
        with:
          name: live-metadata-review-pack-${{ github.run_id }}
          path: tmp/live-metadata-review-pack/
          retention-days: 14

  gate-failed:
    if: inputs.confirm_live_metadata != 'RUN'
    runs-on: ubuntu-latest
    steps:
      - name: Confirmation required
        run: |
          echo "Workflow did not run: confirm_live_metadata must be exactly RUN"
          exit 1
