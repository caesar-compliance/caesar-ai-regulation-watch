related_topics:
  - eu_institutions
  - ai_and_privacy
  - fundamental_rights
  - supervision_of_eu_bodies
review_status: pending_review
notes: >
  Tracked official primary source complementary to EDPB. Supports governance review
  where EU institutional AI or cross-cutting privacy-AI topics matter. May affect
  controls or evidence for organizations interacting with EU bodies or benchmarking
  against EDPS positions. Requires human review before client use.
