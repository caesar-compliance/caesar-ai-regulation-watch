# Confidence in change characterisation — v0.3.1
# Last updated: 19 May 2026

taxonomy_id: confidence-levels
title: Confidence levels
version: "0.3.1"
last_updated: "2026-05-19"
description: >
  How confident the system or author is in the change summary (manual or future
  automated). Always paired with human_review_required for client-facing use.

values:
  - value_id: low
    label: Low
    description: >
      Illustrative, unverified, or high-uncertainty; requires human review.

  - value_id: medium
    label: Medium
    description: >
      Plausible change characterisation; still requires human review before client use.

  - value_id: high
    label: High
    description: >
      Strong signal on source, but still not a substitute for human review or legal advice.
