# Manual sample mappings — for data-model testing only
# Last curated: 19 May 2026

mappings:
  - mapping_id: map-ctrl-sample-eu-ai-act-status
    change_id: sample-eu-ai-act-status-change
    may_affect_controls:
      - control_ref: ctrl_regulatory_tracking
        rationale: >
          A confirmed EUR-Lex metadata or status update may affect how the organisation
          tracks EU AI Act applicability timelines.
      - control_ref: ctrl_ai_system_inventory
        rationale: >
          May affect whether AI system register fields referencing EU legal status need review.
    suggested_control_review:
      - control_ref: ctrl_risk_management_lifecycle
        rationale: >
          Suggested control review if official source changes imply phased obligation updates
          relevant to the organisation's AI systems (requires human confirmation).
    human_review_required: true
    legal_safe_note: >
      Manual sample mapping for data-model testing only. May affect controls; does not
      mandate implementation. Requires human review before client use.

  - mapping_id: map-ctrl-sample-datatilsynet-guidance
    change_id: sample-datatilsynet-guidance-change
    may_affect_controls:
      - control_ref: ctrl_privacy_and_data_protection
        rationale: >
          Updated Datatilsynet material on AI may affect privacy and automated-decision controls.
      - control_ref: ctrl_transparency_and_notices
        rationale: >
          May affect transparency controls for AI involving personal data in Norway.
    suggested_control_review:
      - control_ref: ctrl_human_oversight_documentation
        rationale: >
          Suggested review where guidance discusses human involvement in automated processing.
    human_review_required: true
    legal_safe_note: >
      Manual sample mapping for data-model testing only. Not legal advice. Requires
      human review before client use.
