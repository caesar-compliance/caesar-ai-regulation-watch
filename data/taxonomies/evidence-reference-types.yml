# Draft evidence reference pattern — v0.3.1
# Last updated: 19 May 2026

taxonomy_id: evidence-reference-types
title: Evidence reference types
version: "0.3.1"
last_updated: "2026-05-19"
description: >
  Draft evidence_ref identifiers for regulation-watch mappings and exports.
  NOT confirmed in caesar-ai-evidence until cross-repo alignment. Prefix pattern:
  regulation_watch.evidence.<slug>

values:
  - value_id: regulation_watch.evidence.ai_act_source_snapshot
    label: AI Act source snapshot
    description: >
      Draft ref: snapshot or citation record of official EU AI Act source state.

  - value_id: regulation_watch.evidence.guidance_review_note
    label: Guidance review note
    description: >
      Draft ref: internal note documenting review of official guidance changes.

  - value_id: regulation_watch.evidence.ai_system_register
    label: AI system register
    description: >
      Draft ref: AI system register or inventory evidence item.

  - value_id: regulation_watch.evidence.governance_memo
    label: Governance memo
    description: >
      Draft ref: governance memo referencing regulatory developments.

  - value_id: regulation_watch.evidence.compliance_calendar
    label: Compliance calendar
    description: >
      Draft ref: internal calendar of tracked regulatory dates.

  - value_id: regulation_watch.evidence.dpia
    label: DPIA
    description: >
      Draft ref: data protection impact assessment record.

  - value_id: regulation_watch.evidence.privacy_notice
    label: Privacy notice
    description: >
      Draft ref: privacy notice or policy describing AI processing.

  - value_id: regulation_watch.evidence.transparency_documentation
    label: Transparency documentation
    description: >
      Draft ref: transparency artefacts for AI systems or features.

reference_convention:
  pattern: "^regulation_watch\\.evidence\\.[a-z][a-z0-9_]*$"
  alignment_status: draft_pending_caesar_ai_evidence
  legal_safe_note: >
    References may affect evidence in governance review only; do not imply
    that evidence items exist or are sufficient for any audit outcome.
