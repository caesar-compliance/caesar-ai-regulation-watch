# Official source watchers — v0.7.2 (manual CLI only, not CI)
# Last updated: 19 May 2026

legal_safe_note: >
  Pilot metadata-only watchers for governance review support. Not legal advice.
  Not automated legal conclusions. Human review required for any detected change.
  Does not set verified_on_source or client_use_allowed.

watchers:
  - watcher_id: watcher-eu-ai-office
    adapter_id: official_page_metadata
    source_id: eu-ai-office
    jurisdiction_id: eu
    watcher_type: official_page_metadata
    official_url: https://digital-strategy.ec.europa.eu/en/policies/regulatory-framework-ai
    enabled: true
    monitoring_scope: >
      EU Commission AI regulatory framework landing page metadata only.
      Does not crawl linked documents or subsidiary agency sites.
    check_frequency_recommendation: weekly
    change_detection_mode: metadata_and_content_hash
    snapshot_policy: metadata_only_no_body_storage
    review_status: pending_review
    legal_safe_note: >
      Metadata-only snapshot; content hash for diff signal only. No full body stored.
      Detected changes require human review before any record update.

  - watcher_id: watcher-datatilsynet
    adapter_id: official_page_metadata
    source_id: datatilsynet
    jurisdiction_id: norway
    watcher_type: official_page_metadata
    official_url: https://www.datatilsynet.no/
    enabled: true
    monitoring_scope: >
      Datatilsynet homepage metadata only. Does not crawl theme subsites or PDFs.
    check_frequency_recommendation: weekly
    change_detection_mode: metadata_and_content_hash
    snapshot_policy: metadata_only_no_body_storage
    review_status: pending_review
    legal_safe_note: >
      Metadata-only snapshot; content hash for diff signal only. No full body stored.
      Detected changes require human review before any record update.

  - watcher_id: watcher-edpb-feed
    adapter_id: official_rss_or_feed
    source_id: edpb
    jurisdiction_id: eu
    watcher_type: official_rss_or_feed
    official_url: https://www.edpb.europa.eu/edpb_en
    feed_url: https://www.edpb.europa.eu/feed/publications_en
    feed_format: rss
    enabled: true
    monitoring_scope: >
      EDPB official publications RSS feed metadata only. Does not fetch linked document bodies.
    check_frequency_recommendation: weekly
    change_detection_mode: feed_item_count
    snapshot_policy: metadata_only_no_body_storage
    entry_identity_fields:
      - guid
      - link
    entry_date_fields:
      - pubDate
      - dc:date
    max_entries_per_check: 50
    create_detected_change_for_new_entries: true
    create_detected_change_for_changed_entries: true
    review_status: pending_review
    legal_safe_note: >
      Feed metadata only; entry title/link/date for signals. No article body storage.
      Human review required before any record update.

  - watcher_id: watcher-edps-feed
    adapter_id: official_rss_or_feed
    source_id: edps
    jurisdiction_id: eu
    watcher_type: official_rss_or_feed
    official_url: https://www.edps.europa.eu/_en
    feed_url: https://www.edps.europa.eu/feed/news_en
    feed_format: rss
    enabled: true
    monitoring_scope: >
      EDPS official news RSS feed metadata only. Does not fetch linked article bodies.
    check_frequency_recommendation: weekly
    change_detection_mode: feed_item_count
    snapshot_policy: metadata_only_no_body_storage
    entry_identity_fields:
      - guid
      - link
    entry_date_fields:
      - pubDate
      - updated
    max_entries_per_check: 50
    create_detected_change_for_new_entries: true
    create_detected_change_for_changed_entries: true
    review_status: pending_review
    legal_safe_note: >
      Feed metadata only; entry title/link/date for signals. No article body storage.
      Human review required before any record update.
