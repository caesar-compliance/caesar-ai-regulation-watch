    may_affect_evidence:
      - evidence_ref: regulation_watch.evidence.dpia
        reference_alignment: draft_pending_caesar_ai_evidence
        rationale: >
          Guidance updates on AI may affect DPIA content for Norwegian personal-data processing.
      - evidence_ref: regulation_watch.evidence.privacy_notice
        reference_alignment: draft_pending_caesar_ai_evidence
        rationale: >
          May affect privacy notices describing automated decision-making or AI features.
    suggested_evidence_review:
      - evidence_ref: regulation_watch.evidence.dpia
        reference_alignment: draft_pending_caesar_ai_evidence
        suggested_action: review
        rationale: >
          Suggested review of DPIA records if Datatilsynet publishes substantive new guidance.
      - evidence_ref: regulation_watch.evidence.guidance_review_note
        reference_alignment: draft_pending_caesar_ai_evidence
        suggested_action: create
        rationale: >
          Suggested internal guidance review note after confirming official content.
    human_review_required: true
    legal_safe_note: >
      Manual sample mapping for data-model testing only. Requires human review before client use.
