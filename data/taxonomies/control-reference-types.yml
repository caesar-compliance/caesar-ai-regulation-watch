# Draft control reference pattern — v0.3.1
# Last updated: 19 May 2026

taxonomy_id: control-reference-types
title: Control reference types
version: "0.3.1"
last_updated: "2026-05-19"
description: >
  Draft control_ref identifiers for regulation-watch mappings and exports.
  NOT confirmed in caesar-ai-evidence until cross-repo alignment. Prefix pattern:
  regulation_watch.control.<slug>

values:
  - value_id: regulation_watch.control.ai_act_inventory_review
    label: AI Act inventory review
    description: >
      Draft ref: review AI system inventory against tracked EU AI Act developments.

  - value_id: regulation_watch.control.gpai_obligation_review
    label: GPAI obligation review
    description: >
      Draft ref: review GPAI-related obligations and provider documentation.

  - value_id: regulation_watch.control.regulatory_tracking
    label: Regulatory tracking
    description: >
      Draft ref: process for tracking applicable regulation and source changes.

  - value_id: regulation_watch.control.risk_management_lifecycle
    label: Risk management lifecycle
    description: >
      Draft ref: AI risk management lifecycle controls.

  - value_id: regulation_watch.control.privacy_and_data_protection
    label: Privacy and data protection
    description: >
      Draft ref: privacy and data protection controls for AI processing.

  - value_id: regulation_watch.control.transparency_and_notices
    label: Transparency and notices
    description: >
      Draft ref: transparency and notice controls for AI features.

  - value_id: regulation_watch.control.human_oversight_documentation
    label: Human oversight documentation
    description: >
      Draft ref: human oversight documentation for automated processing.

reference_convention:
  pattern: "^regulation_watch\\.control\\.[a-z][a-z0-9_]*$"
  alignment_status: draft_pending_caesar_ai_evidence
  legal_safe_note: >
    References may affect controls in governance review only; do not imply
    obligations or that controls exist in a client control library.
